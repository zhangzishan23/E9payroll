server {
    listen 8080;
    server_name localhost;

    absolute_redirect off;

    client_max_body_size 50m;
    client_body_timeout 300s;
    client_header_timeout 300s;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 301 /e9salary/;
    }

    location ^~ /e9salary/api/ {
        rewrite ^/e9salary/api/(.*)$ /api/$1 break;
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }

    location ^~ /e9salary/docs {
        rewrite ^/e9salary/(.*)$ /$1 break;
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /e9salary/redoc {
        rewrite ^/e9salary/(.*)$ /$1 break;
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /e9salary/openapi.json {
        rewrite ^/e9salary/(.*)$ /$1 break;
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /e9salary/health {
        rewrite ^/e9salary/(.*)$ /$1 break;
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /e9salary/assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /e9salary/ {
        try_files $uri $uri/ /e9salary/index.html;
    }
}
