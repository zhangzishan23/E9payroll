version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: e9-salary-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: ${TZ}
    ports:
      - "${DB_DOCKER_PORT}:${DB_INTERNAL_PORT}"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - e9-salary-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: e9-salary-backend
    env_file:
      - .env
    volumes:
      - ./data/app:${DATA_DIR}
      - ./backups:${BACKUP_DIR}
      - ./temp:${TEMP_DIR}
    ports:
      - "${BACKEND_DOCKER_PORT}:${BACKEND_DOCKER_PORT}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - e9-salary-net
    command: >
      sh -c "python init_admin.py &&
             uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_DOCKER_PORT}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: e9-salary-frontend
    ports:
      - "${FRONTEND_DOCKER_PORT}:${FRONTEND_INTERNAL_PORT}"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - e9-salary-net

networks:
  e9-salary-net:
    driver: bridge
